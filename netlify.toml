[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — all routes serve index.html so React Router works
# Must come AFTER the functions block so /.netlify/** is not caught by this rule
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
